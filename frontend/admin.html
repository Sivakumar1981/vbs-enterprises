<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin – VBS Enterprises</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/admin.css"/>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><img src="images/VBS_logo.png" alt="VBS" style="height:80px;width:auto;object-fit:contain"/></div>
    <h1>VBS Enterprises</h1>
    <p>Admin Panel</p>
    <div class="login-form">
      <div class="field"><label>Username</label><input type="text" id="l-user" placeholder="Admin username" autocomplete="username"/></div>
      <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="Password" autocomplete="current-password"/></div>
      <div id="l-err" class="login-err" style="display:none"></div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Login →</button>
    </div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="admin-app" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="images/VBS_logo.png" alt="VBS" style="height:40px;width:auto;object-fit:contain"/>
      <div><h2>VBS Enterprises</h2><span>Admin Panel</span></div>
    </div>
    <nav class="sidebar-nav">
      <button class="sn-btn active" data-tab="dashboard">📊 Dashboard</button>
      <button class="sn-btn" data-tab="products">📦 Products</button>
      <button class="sn-btn" data-tab="orders">🧾 Orders</button>
    </nav>
    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    <a class="visit-shop" href="/" target="_blank">🛍️ Visit Shop ↗</a>
  </aside>

  <!-- MAIN -->
  <div class="admin-main">

    <!-- TOP BAR -->
    <div class="topbar">
      <button class="hamburger-admin" onclick="toggleSidebar()">☰</button>
      <h3 id="topbar-title">Dashboard</h3>
      <span id="topbar-sub">Overview</span>
    </div>

    <!-- DASHBOARD TAB -->
    <div class="tab active" id="tab-dashboard">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card loading-card"><div class="spinner"></div></div>
      </div>
      <div class="dash-section">
        <h3 class="dash-title">📬 Latest Orders</h3>
        <div id="dash-orders"></div>
      </div>
    </div>

    <!-- PRODUCTS TAB -->
    <div class="tab" id="tab-products">

      <!-- ADD / EDIT FORM -->
      <div class="form-card" id="product-form-card">
        <h3 id="form-heading">➕ Add New Product</h3>
        <div class="form-grid">
          <div class="field">
            <label>Product Name *</label>
            <input type="text" id="p-name" placeholder="e.g. Cold Pressed Sesame Oil"/>
          </div>
          <div class="field">
            <label>Category *</label>
            <select id="p-cat">
              <option value="oil">🫙 Oil</option>
              <option value="clothes">👗 Clothes</option>
              <option value="rice">🌾 Rice</option>
              <option value="other">📦 Other</option>
            </select>
          </div>
          <div class="field">
            <label>Price (₹) *</label>
            <input type="number" id="p-price" placeholder="250" min="0"/>
          </div>
          <div class="field">
            <label>Unit</label>
            <input type="text" id="p-unit" placeholder="per litre / per piece"/>
          </div>
          <div class="field">
            <label>Stock Quantity</label>
            <input type="number" id="p-stock" placeholder="50" min="0"/>
          </div>
          <div class="field">
            <label>Product Photo</label>
            <input type="file" id="p-image" accept="image/jpeg,image/png,image/webp"/>
          </div>
          <div class="field full">
            <label>Description</label>
            <textarea id="p-desc" placeholder="Brief product description..."></textarea>
          </div>
        </div>
        <div id="img-preview-wrap" style="display:none;margin-bottom:1rem">
          <p style="font-size:.78rem;color:var(--muted);margin-bottom:.4rem">Current Image:</p>
          <img id="img-preview" style="height:120px;border-radius:8px;object-fit:cover"/>
        </div>
        <div class="form-actions">
          <button class="btn-gold" onclick="saveProduct()">💾 Save Product</button>
          <button class="btn-ghost" onclick="clearProductForm()">✕ Clear</button>
        </div>
      </div>

      <!-- PRODUCTS TABLE -->
      <div class="table-card">
        <div class="table-top">
          <h3>All Products</h3>
          <input type="text" id="prod-search" placeholder="🔍 Search products..." oninput="filterAdminProducts()"/>
        </div>
        <div class="table-wrap">
          <table id="prod-table">
            <thead>
              <tr>
                <th>Photo</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="prod-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab" id="tab-orders">
      <div class="orders-top">
        <div class="order-filters">
          <select id="order-status-filter" onchange="loadOrders()">
            <option value="">All Orders</option>
            <option value="new">🆕 New</option>
            <option value="confirmed">✅ Confirmed</option>
            <option value="processing">⚙️ Processing</option>
            <option value="ready">📦 Ready</option>
            <option value="delivered">🚚 Delivered</option>
            <option value="cancelled">❌ Cancelled</option>
          </select>
          <button class="btn-ghost" onclick="loadOrders()">🔄 Refresh</button>
        </div>
      </div>
      <div id="orders-list"></div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toast-icon">✅</span>
  <span id="toast-msg">Done!</span>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirm-overlay">
  <div class="modal">
    <h3 id="confirm-title">Confirm</h3>
    <p id="confirm-msg" style="color:var(--muted);margin:.75rem 0 1.5rem"></p>
    <div style="display:flex;gap:.75rem">
      <button class="btn-danger" id="confirm-ok">Confirm</button>
      <button class="btn-ghost" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
